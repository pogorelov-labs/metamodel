- id: data_process
  name: Data Process
  name_ru: Дата-процесс
  metamodel_level: data_details
  category: data
  description: 'Формализованная, управляемая, повторяемая или непрерывная последовательность вычислительных шагов над дата-объектами,
    которая может, но не обязана порождать новый дата-объект или изменять существующий дата-объект (один или несколько). Может,
    но не обязана порождать side-effects: индикаторы, логи, и т.д.'
  scope_notes: 'Формализуется в виде кода, конфигураций, параметров или объектов в системе управления дата-процессами (например
    профиль DQ в DQS). Подразделяется на: непрерывный процесс (stream), пакетный процесс (batch). Запуск дата-процесса порождает
    экземпляр и имеет контекст исполнения (среда, переменные окружения, параметры запуска). Имеет конкретную логику и последовательность
    вычислений над дата-объектами: логический план / граф вычислений. Может группироваться в более сложные процессы. Создается
    IT Component (MSH / Other). Управляется через DH/DC/API.'
  aliases:
  - value: пайплайн
    lang: ru
    alias_type: synonym
    status: active
  - value: pipeline
    lang: en
    alias_type: synonym
    status: active
  - value: ETL
    lang: neutral
    alias_type: synonym
    status: active
  examples:
  - Task в Airflow
  - Dag в Airflow
  - Kafka Mirror/Connector
  - DQ check (профиль)
  usage_purpose: Понимать вычислительные процессы над данными.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: data_process.type
    name: Тип пайплайна
    metamodel_level: solution_details
    description: ETL, ELT, streaming и т.п.
  - id: data_process.config_parameters
    name: Конфигурация
    metamodel_level: solution_details
    description: Набор параметров запуска.
  - id: data_process.schedule
    name: Расписание
    metamodel_level: solution_details
    description: Cron/airflow расписание выполнения.
