- id: business_capability
  name: Business Capability
  name_ru: Бизнес-способность
  metamodel_level: strategic_view
  category: capability
  description: Устойчивая, независимая от оргструктуры и повторяемая способность банка выполнять определенный вид деятельности
    или достигать конкретной бизнес-цели посредством сочетания процессов, людей, технологий и информации.
  scope_notes: Название — существительное с пояснением. Не использовать глаголы — фокус не на действии, а на способности его
    выполнять. Может быть задана иерархия бизнес-способностей. Не зависит от оргструктуры.
  aliases:
  - value: БС
    lang: ru
    alias_type: abbreviation
    status: active
  - value: capability
    lang: en
    alias_type: abbreviation
    status: active
  - value: бизнес-возможность
    lang: ru
    alias_type: synonym
    status: active
  examples:
