- id: business_function
  name: Business Function
  name_ru: Бизнес-функция
  metamodel_level: business_details
  category: process
  description: Устойчивая (относительно постоянная) область ответственности организации выполнять определенный набор действий
    (обычно сгруппированных по требуемым навыкам, ресурсам и компетенциям) для достижения определенных результатов.
  scope_notes: Функция отвечает на вопрос "Что делает организация (как область деятельности)?". За функцию всегда отвечает
    одна бизнес-роль (индивидуальная функция) либо одна оргединица (общебанковская функция). Реализуется одним или несколькими
    бизнес-процессами и обеспечивает одну бизнес-способность. В случае автоматизации может указываться на диаграмме Solution
    Architecture внутри ИТ-системы. Результат одной функции часто является входом для другой.
  aliases:
  - value: БФ
    lang: ru
    alias_type: abbreviation
    status: active
  - value: BF
    lang: en
    alias_type: abbreviation
    status: active
  - value: функция
    lang: ru
    alias_type: abbreviation
    status: active
  examples:
  - KYC
  - Подбор и найм персонала
  - Ведение бухучета
  usage_purpose: Понимать из каких функциональных компонентов состоит банк, понимать чем заняты бизнес-роли и оргединицы.
  status: stub
  introduced_in: '1.0'
