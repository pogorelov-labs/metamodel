- id: business_operation
  name: Business Operation
  name_ru: Бизнес-операция
  metamodel_level: business_details
  category: process
  description: Определяет набор логически связанных бизнес-действий, который может выполняться в рамках бизнес-процесса как
    единое целое (шаг процесса), используя бизнес-сущности и обеспечивая управляемые взаимодействия между различными бизнес-функциями.
  scope_notes: Название — глагол + бизнес-сущность. Относится к одной бизнес-функции. Может рассматриваться как шаг бизнес-процесса.
    Может быть как целиком автоматизирована (ИТ-системой с доступом через API), так и выполняться полностью вручную. Может
    состоять из набора логически связанных бизнес-действий.
  aliases:
  - value: операция
    lang: ru
    alias_type: abbreviation
    status: active
  - value: шаг процесса
    lang: ru
    alias_type: synonym
    status: active
  - value: operation
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - Учесть комиссию за транзакцию
  usage_purpose: Понимать из каких шагов состоит бизнес-процесс и уровень автоматизации.
  status: stub
  introduced_in: '1.0'
- id: business_action
  name: Business Action
  name_ru: Бизнес-действие
  metamodel_level: business_details
  category: process
  description: Элементарная активность, выполняемая в рамках бизнес-операции.
  scope_notes: Атомарное действие, т.е. не может быть декомпозировано. Может быть либо выполнено целиком, либо не выполнено
    совсем. В случае автоматизации соответствует вызову API.
  aliases:
  - value: действие
    lang: ru
    alias_type: abbreviation
    status: active
  - value: action
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - Выполнение проводки
  usage_purpose: Понимать из каких действий состоит бизнес-операция и отслеживать тайминг.
  status: stub
  introduced_in: '1.0'
- id: business_entity
  name: Business Entity
  name_ru: Бизнес-сущность
  metamodel_level: business_details
  category: business_object
  description: Идентифицируемая сущность или ресурс, который имеет значение для бизнеса, используется или создается в бизнес-деятельности,
    и служит носителем информации или ценности в бизнес-процессах, потоках создания ценности и бизнес-способностях.
  scope_notes: Название — существительное / прилагательное + существительное. Ведутся в отдельном реестре. Пассивный элемент
    — сам бизнес-объект не выполняет действий над другими объектами или над собой.
  aliases:
  - value: бизнес-объект
