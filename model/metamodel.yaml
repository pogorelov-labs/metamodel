- id: value_stream_stage
  name: Value Stream Stage
  name_ru: Стадия потока создания ценности
  metamodel_level: business_details
  category: value_delivery
  description: Логически выделенный и управляемый шаг или группа взаимосвязанных действий в потоке создания ценности, который
    преобразует входящие ресурсы, данные или бизнес-объекты в более ценное состояние, приближая процесс к достижению конечного
    результата для потребителя ценности.
  scope_notes: Название — отглагольное существительное. Название отражает область ответственности. Реализуется бизнес-процессом
    самого высокого уровня. Стадии потока не ведутся в отдельном реестре, а являются частью VS. Входным и выходным условием
    является состояние определенных бизнес-сущностей.
  aliases:
  - value: стадия потока
    lang: ru
    alias_type: abbreviation
    status: active
  - value: VS Stage
    lang: en
    alias_type: abbreviation
    status: active
