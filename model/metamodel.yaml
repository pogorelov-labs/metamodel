- id: data_product
  name: Data Product
  name_ru: Дата Продукт
  metamodel_level: data_details
  category: data
  description: 'Объединение дата-сущностей и процессов/сущностей, производных от данных. Имеет все свойства продукта: бизнес-цель,
    пользователи, владелец, жизненный цикл. Автономный, доступный для обнаружения и повторного использования набор дата-объектов,
    снабженный всеми необходимыми метаданными и механизмами доступа, который создается для решения конкретных бизнес-задач
    и предоставляет измеримую ценность своим потребителям.'
  scope_notes: 'Должен иметь ответственного бизнес-владельца (DOA). Должен иметь связь с дата-контрактом. Связан с бизнес-контекстом
    (бизнес-сущности). Может иметь сложные связи с другими Дата Продуктами. Имеет жизненный цикл (статус). Может агрегировать
    несколько Объектов данных (>=1). Сам по себе несет ценность пользователям. Описывается в CAP / DH / Domain services. Добровольная
    система подписок: подписчиками автоматически становятся владельцы зависимых по горизонтальному линеаджу продуктов.'
  aliases:
